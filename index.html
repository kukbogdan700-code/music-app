<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-box { display: flex; width: 100%; max-width: 400px; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; background: #1a1a1a; color: white; border: 1px solid #333; }
        button { background: #ff5500; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; }
        #results { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <h2 style="color: #0088cc;">Pulse Vibe</h2>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Напиши test...">
        <button onclick="searchMusic()">Найти</button>
    </div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const res = document.getElementById('results');
            if (!query) return;

            // Сразу меняем текст, чтобы увидеть, что кнопка ЖИВАЯ
            res.innerHTML = '<p style="color: orange;">Связь с сервером...</p>';

            try {
                const url =     `https://music-app-bnm4.onrender.com/search?q=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();

                res.innerHTML = '';
                data.forEach(track => {
                    res.innerHTML += 
                        <div style="background:#1a1a1a; padding:10px; margin-bottom:5px; border-radius:8px;">
                            <strong>${track.title}</strong><br>
                            <small>${track.artist}</small>
                        </div>;
                });
            } catch (e) {
                res.innerHTML = '<p style="color: red;">Сервер спит. Нажми еще раз через 15 сек.</p>';
            }
        }
    </script>
</body>
</html>
