<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: sans-serif; 
            padding: 20px; 
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #0088cc; text-align: center; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .track {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
        }
        audio { width: 100%; margin-top: 10px; }
        .status { color: #ffaa00; text-align: center; padding: 10px; }
    </style>
</head>
<body>
    <h1>🎵 Pulse Vibe</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введите test..." value="test">
        <button onclick="searchMusic()">Найти</button>
    </div>
    
    <div id="status" class="status"></div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            
            if (!query) return;
            
            statusDiv.innerHTML = '🔍 Ищем...';
            resultsDiv.innerHTML = '';
            
            try {
                const url = 'https://music-app-bnm4.onrender.com/search?q=' + encodeURIComponent(query);
                
                const response = await fetch(url);
                const data = await response.json();
                
                statusDiv.innerHTML = '✅ Найдено: ' + data.length + ' треков';
                
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<div class="track">😕 Ничего не найдено</div>';
                    return;
                }
                
                for(let i = 0; i < data.length; i++) {
                    const track = data[i];
                    resultsDiv.innerHTML += 
                        '<div class="track">' +
                            '<div style="font-weight:bold;">' + (track.title || 'Без названия') + '</div>' +
                            '<div style="color:#888;">' + (track.artist || 'Неизвестен') + '</div>' +
                            '<audio controls src="' + track.url + '"></audio>' +
                        '</div>';
                }
                
            } catch (error) {
                statusDiv.innerHTML = '❌ Ошибка подключения к серверу';
                console.error(error);
            }
        }
        
        window.addEventListener('load', function() {
            setTimeout(searchMusic, 500);
        });
    </script>
</body>
</html>
