<div class="subtitle">Поиск музыки на YouTube</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Что ищем? (рок, поп, джаз...)" value="rock">
        <button id="searchBtn">Найти</button>
    </div>
    
    <div id="status" class="status">⚡ Введите запрос для поиска</div>
    <div id="results"></div>
    <div id="stats" class="stats"></div>

    <script>
        const SERVER_URL = 'https://music-app-bnm4-mne6.onrender.com';

        async function searchMusic() {
            const query = document.getElementById('searchInput').value.trim();
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            const stats = document.getElementById('stats');
            
            if (!query) {
                status.innerHTML = '⚠️ Введите запрос';
                return;
            }
            
            status.innerHTML = '🔍 Ищем на YouTube...';
            results.innerHTML = '';
            stats.innerHTML = '';
            
            try {
                const response = await fetch(`${SERVER_URL}/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (!tracks || tracks.length === 0) {
                    status.innerHTML = '😕 Ничего не найдено';
                    return;
                }
                
                status.innerHTML = `✅ Найдено на YouTube: ${tracks.length} видео`;
                stats.innerHTML = `По запросу "${query}"`;
                
                tracks.forEach(track => {
                    results.innerHTML += `
                        <div class="track">
                            <div class="track-header">
                                <img src="${track.thumbnail}" class="track-thumbnail" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22 viewBox=%220 0 60 60%22><rect width=%2260%22 height=%2260%22 fill=%22%23333%22/><text x=%2215%22 y=%2235%22 fill=%22%23ff5500%22 font-size=%2220%22>🎵</text></svg>'">
                                <div class="track-info">
                                    <div class="track-title">${track.title}</div>
                                    <div class="track-artist">${track.artist}</div>
                                </div>
                            </div>
                            <a href="${track.url}" target="_blank" class="youtube-btn">
                                ▶ Смотреть на YouTube
                            </a>
                        </div>
                    `;
                });
                
            } catch (error) {
                console.error('Ошибка:', error);
                status.innerHTML = '❌ Ошибка подключения к серверу';
            }
        }

        document.getElementById('searchBtn').onclick = searchMusic;
        document.getElementById('searchInput').onkeypress = (e) => {
            if (e.key === 'Enter') searchMusic();
        };

        window.onload = () => {
            setTimeout(searchMusic, 1000);
        };
    </script>
</body>
</html>
