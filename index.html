<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Vibe - SoundCloud</title>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            color: #ff5500;
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            background: #1a1a1a;
            color: white;
            border: 2px solid #333;
            font-size: 16px;
        }
        
        input:focus {
            border-color: #ff5500;
            outline: none;
        }
        
        button {
            background: #ff5500;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            background: #ff3300;
        }
        
        .track {
            background: #1a1a1a;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        
        .track-info {
            padding: 15px;
        }
        
        .track-title {
            font-weight: bold;
            font-size: 16px;
            color: white;
        }
        
        .track-artist {
            color: #ff5500;
            font-size: 14px;
            margin-top: 5px;
        }
        
        audio {
            width: 100%;
            height: 40px;
            border-radius: 0 0 15px 15px;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            color: #888;
            background: #1a1a1a;
            border-radius: 25px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>🎵 Pulse Vibe</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск на SoundCloud..." value="rock">
        <button id="searchBtn">Найти</button>
    </div>
    
    <div id="status" class="status">⚡ Поиск музыки на SoundCloud</div>
    <div id="results"></div>

    <script>
        // ВАШ СЕРВЕР НА RENDER.COM
        const SERVER_URL = 'https://music-app-bnm4-mne6.onrender.com';
        
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');

        async function searchMusic() {
            const query = searchInput.value.trim();
            
            if (!query) {
                statusDiv.innerHTML = '⚠️ Введите запрос';
                return;
            }

            statusDiv.innerHTML = '🔍 Ищем на SoundCloud...';
            resultsDiv.innerHTML = '';

            try {
                const url = `${SERVER_URL}/search?q=${encodeURIComponent(query)}`;
                console.log('Запрос:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                if (!data || data.length === 0) {
                    statusDiv.innerHTML = '😕 Ничего не найдено на SoundCloud';
return;
                }
                
                statusDiv.innerHTML = `✅ Найдено на SoundCloud: ${data.length} треков`;
                
                data.forEach(track => {
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.innerHTML = `
                        <div class="track-info">
                            <div class="track-title">🎵 ${track.title}</div>
                            <div class="track-artist">👤 ${track.artist}</div>
                        </div>
                        <audio controls src="${track.url}"></audio>
                    `;
                    resultsDiv.appendChild(trackDiv);
                });
                
            } catch (error) {
                console.error('Ошибка:', error);
                statusDiv.innerHTML = '❌ Ошибка подключения к SoundCloud';
            }
        }

        searchBtn.onclick = searchMusic;
        searchInput.onkeypress = (e) => {
            if (e.key === 'Enter') searchMusic();
        };

        window.onload = () => {
            setTimeout(searchMusic, 1000);
        };
    </script>
</body>
</html>
