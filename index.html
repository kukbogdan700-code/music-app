<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Vibe - Музыка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            color: #ff5500;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            background: #1a1a1a;
            color: white;
            border: 2px solid #333;
            font-size: 16px;
        }
        button {
            background: #ff5500;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        .track {
            background: #1a1a1a;
            margin-bottom: 15px;
            border-radius: 15px;
            padding: 15px;
        }
        .track-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .track-artist {
            color: #ff5500;
            font-size: 14px;
            margin-bottom: 10px;
        }
        audio {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
        .loading {
            color: #888;
            text-align: center;
            padding: 20px;
        }
        .now-playing {
            background: #ff5500;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎵 Pulse Vibe</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Что послушать?" value="rock">
        <button id="searchBtn">Найти</button>
    </div>
    
    <div id="nowPlaying" class="now-playing" style="display: none;"></div>
    <div id="status" class="loading">⚡ Введите запрос</div>
    <div id="results"></div>

    <script>
        const SERVER_URL = 'https://music-app-bnm4-mne6.onrender.com';
        let currentAudio = null;

        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            const nowPlaying = document.getElementById('nowPlaying');
            
            status.innerHTML = '🔍 Ищем...';
            results.innerHTML = '';
            nowPlaying.style.display = 'none';
            
            try {
                const response = await fetch(`${SERVER_URL}/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (tracks.length === 0) {
                    status.innerHTML = '😕 Ничего не найдено';
                    return;
                }
                
                status.innerHTML = `✅ Найдено треков: ${tracks.length}`;
                
                tracks.forEach(track => {
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.innerHTML = `
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                        <audio controls preload="none" onplay="stopOtherAudio(this)">
<source src="${SERVER_URL}/audio/${track.videoId}" type="audio/mpeg">
                        </audio>
                    `;
                    results.appendChild(trackDiv);
                });
                
            } catch (error) {
                status.innerHTML = '❌ Ошибка';
                console.error(error);
            }
        }

        function stopOtherAudio(audio) {
            if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = audio;
            
            document.getElementById('nowPlaying').style.display = 'block';
            document.getElementById('nowPlaying').innerHTML = '🎵 Сейчас играет';
        }

        document.getElementById('searchBtn').onclick = searchMusic;
        document.getElementById('searchInput').onkeypress = (e) => {
            if (e.key === 'Enter') searchMusic();
        };

        window.onload = () => {
            setTimeout(searchMusic, 1000);
        };
    </script>
</body>
</html>
