<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0f0f0f; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { color: #0088cc; margin-bottom: 10px; }
        .player-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        audio { margin: 20px 0; filter: invert(100%); }
        .status { font-size: 0.9em; color: #888; margin-bottom: 20px; }
        button { 
            background: #0088cc; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 10px; 
            font-weight: bold;
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>Pulse Vibe 🎧</h1>
        <div class="status">Тестовый режим плеера</div>
        
        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>

        <br>
        <button onclick="window.Telegram.WebApp.close()">Закрыть приложение</button>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
    </script>
</body>
</html>
