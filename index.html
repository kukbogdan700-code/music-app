<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #0088cc; margin-bottom: 20px; }
        .search-box { display: flex; width: 100%; max-width: 400px; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        button { background: #ff5500; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .results { width: 100%; max-width: 400px; }
        .track { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #222; }
        .track-info { display: flex; flex-direction: column; }
        .play-btn { background: #0088cc; padding: 8px 15px; font-size: 0.8em; border-radius: 8px; border: none; color: white; cursor: pointer; }
        audio { width: 100%; margin-top: 20px; filter: invert(1); }
    </style>
</head>
<body>
    <h1>Pulse Vibe 🎧</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введите название песни...">
        <button onclick="searchMusic()">Найти</button>
    </div>

    <div id="results" class="results"></div>

    <audio id="audioPlayer" controls style="display:none;"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const resultsContainer = document.getElementById('results');
            if (!query) return;

            resultsContainer.innerHTML = '<p style="color: #888;">Загрузка...</p>';

            try {
                // ТЕПЕРЬ ССЫЛКА В ПРАВИЛЬНЫХ КАВЫЧКАХ (клавиша Ё)
                const url = https:`//www.google.com/search?q=https://music-app-bnm4.onrender.com/search%3Fq%3D${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();

                resultsContainer.innerHTML = '';
                
                if (!data || data.length === 0) {
                    resultsContainer.innerHTML = '<p>Ничего не найдено</p>';
                    return;
                }

                data.forEach(track => {
                    // ТУТ ТОЖЕ ИСПРАВЛЕНЫ КАВЫЧКИ ДЛЯ HTML-БЛОКА
                    resultsContainer.innerHTML += 
                        <div class="track">
                            <div class="track-info">
                                <strong>${track.title}</strong>
                                <span style="color: #888; font-size: 0.8em;">${track.artist}</span>
                            </div>
                            <button class="play-btn" onclick="playTrack('${track.url}')">Слушать</button>
                        </div>
                    ;
                });
            } catch (error) {
                resultsContainer.innerHTML = '<p style="color: red;">Ошибка сервера. Попробуй еще раз через 10-15 сек.</p>';
                console.error(error);
            }
        }

        function playTrack(url) {
            const player = document.getElementById('audioPlayer');
            player.style.display = 'block';
            player.src = url;
            player.play();
        }
    </script>
</body>
</html>
