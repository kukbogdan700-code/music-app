<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; padding: 20px; }
        .debug-box { background: #1a1a1a; padding: 10px; border-radius: 8px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; color: #0f0; border: 1px solid #333; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin: 5px; }
        input { padding: 10px; width: 200px; border-radius: 8px; background: #1a1a1a; color: white; border: 1px solid #333; }
    </style>
</head>
<body>
    <h2>🔧 Pulse Vibe - Диагностика</h2>
    
    <div>
        <input id="searchInput" placeholder="Введите test" value="test">
        <button onclick="testServer()">1️⃣ Проверить сервер</button>
        <button onclick="searchMusic()">2️⃣ Поиск музыки</button>
    </div>
    
    <div id="debug" class="debug-box">Готов к диагностике...</div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function log(message) {
            document.getElementById('debug').innerText = message;
            console.log(message);
        }

        // Тест 1: Проверка сервера
        async function testServer() {
            log('🔄 Проверяем сервер...');
            try {
                const response = await fetch('https://music-app-bnm4.onrender.com');
                const text = await response.text();
                log(✅ Сервер ответил: ${text});
            } catch (e) {
                log(❌ Ошибка: ${e.message});
            }
        }

        // Тест 2: Поиск музыки
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            
            log(🔄 Ищем: "${query}"...);
            resultsDiv.innerHTML = '<p>⏳ Загрузка...</p>';
            
            try {
                const url = https://music-app-bnm4.onrender.com/search?q=${encodeURIComponent(query)};
                log(🌐 URL: ${url});
                
                const response = await fetch(url);
                log(📡 Статус: ${response.status} ${response.statusText});
                
                const data = await response.json();
                log(📦 Данные: ${JSON.stringify(data, null, 2)});
                
                if (!data || data.length === 0) {
                    resultsDiv.innerHTML = '<p>😕 Ничего не найдено</p>';
                    return;
                }
                
                resultsDiv.innerHTML = data.map(track => 
                    <div style="background:#1a1a1a; padding:15px; margin:10px 0; border-radius:12px;">
                        <div style="font-weight:bold;">${track.title || 'Без названия'}</div>
                        <div style="color:#888;">${track.artist || 'Неизвестен'}</div>
                        <audio controls src="${track.url}" style="width:100%; margin-top:10px;"></audio>
                    </div>
                ).join('');
                
                log('✅ Готово!');
                
            } catch (e) {
                log(❌ Ошибка: ${e.message});
                resultsDiv.innerHTML = <p style="color:red;">Ошибка: ${e.message}</p>;
            }
        }

        // Авто-тест при загрузке
        window.addEventListener('load', () => {
            setTimeout(testServer, 1000);
        });
    </script>
</body>
</html>
