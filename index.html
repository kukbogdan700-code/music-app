<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <script src='https://telegram.org/js/telegram-web-app.js'></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #0088cc; margin-bottom: 20px; }
        .search-box { display: flex; width: 100%; max-width: 400px; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        button { background: #ff5500; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .results { width: 100%; max-width: 400px; }
        .track { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #222; }
        .track-info { display: flex; flex-direction: column; }
        .play-btn { background: #0088cc; padding: 8px 15px; font-size: 0.8em; border-radius: 8px; border: none; color: white; cursor: pointer; }
        audio { width: 100%; margin-top: 20px; filter: invert(1); }
    </style>
</head>
<body>
    <h1>Pulse Vibe 🎧</h1>
    
    <div class='search-box'>
        <input type='text' id='searchInput' placeholder='Введите название...'>
        <button onclick='searchMusic()'>Найти</button>
    </div>

    <div id='results' class='results'></div>
    <audio id='audioPlayer' controls style='display:none;'></audio>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();

        async function searchMusic() {
            var query = document.getElementById('searchInput').value;
            var res = document.getElementById('results');
            if (!query) return;

            res.innerHTML = '<p style="color: #888;">Загрузка...</p>';

            try {
                // Соединяем строки через плюс и одинарные кавычки
                var url = 'https://music-app-bnm4-mne6.onrender.com/search?q=' + encodeURIComponent(query);
                var response = await fetch(url);
                var data = await response.json();

                res.innerHTML = '';
                
                if (!data || data.length === 0) {
                    res.innerHTML = '<p>Ничего не найдено</p>';
                    return;
                }

                for (var i = 0; i < data.length; i++) {
                    var track = data[i];
                    var html = '';
                    html += '<div class="track">';
                    html += '<div class="track-info">';
                    html += '<strong>' + track.title + '</strong>';
                    html += '<span style="color: #888; font-size: 0.8em;">' + track.artist + '</span>';
                    html += '</div>';
                    html += '<button class="play-btn" onclick="playTrack(\'' + track.url + '\')">Слушать</button>';
                    html += '</div>';
                    res.innerHTML += html;
                }
            } catch (error) {
                res.innerHTML = '<p style="color: red;">Сервер не отвечает. Проверьте Render.com</p>';
            }
        }

        function playTrack(url) {
            var player = document.getElementById('audioPlayer');
            player.style.display = 'block';
            player.src = url;
            player.play();
        }
    </script>
</body>
</html>
