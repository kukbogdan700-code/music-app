<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Vibe</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400 -px; margin: auto; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; border-radius: 5px; border: none; cursor: pointer; background: #ff9800; color: white; }
        .track { background: #333; margin-top: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .play-btn { background: #00bcd4; padding: 5px 15px; }
        #results { margin-top: 20px; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pulse Vibe 🎧</h1>
        <input type="text" id="searchInput" placeholder="Какую музыку ищем?">
        <button onclick="searchMusic()">Найти</button>
        
        <div id="results"></div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const res = document.getElementById('results');
            if (!query) return;

            res.innerHTML = '<p>Загрузка...</p>';

            try {
                // Твой актуальный адрес на Render
                const url = 'https://music-app-bnm4-mne6.onrender.com/search?q=' + encodeURIComponent(query);
                const response = await fetch(url);
                const data = await response.json();

                res.innerHTML = '';

                if (!data || data.length === 0) {
                    res.innerHTML = '<p>Ничего не найдено</p>';
                    return;
                }

                data.forEach(track => {
                    const html = `
                        <div class="track">
                            <div>
                                <strong>${track.title}</strong><br>
                                <small style="color: #aaa;">${track.artist}</small>
                            </div>
                            <button class="play-btn" onclick="playTrack('${track.url}')">Слушать</button>
                        </div>
                   ` ;
                    res.insertAdjacentHTML('beforeend', html);
                });
            } catch (error) {
                res.innerHTML = '<p style="color: red;">Ошибка связи с сервером</p>';
            }
        }

        function playTrack(url) {
            let player = document.getElementById('audio-player');
            if (!player) {
                player = document.createElement('audio');
                player.id = 'audio-player';
                player.controls = true;
                document.querySelector('.container').appendChild(player);
            }
            player.src = url;
            player.play();
        }
    </script>
</body>
</html>
