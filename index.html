<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px 20px;
            margin: 20px 0;
            border: 2px solid #333;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 12px;
            margin: 10px;
            cursor: pointer;
            width: 200px;
            font-weight: bold;
        }
        button:hover {
            background: #006699;
        }
        .counter {
            font-size: 48px;
            font-weight: bold;
            color: #ff5500;
            margin: 20px;
        }
        .test-area {
            background: #222;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>🔧 ТЕСТОВЫЙ РЕЖИМ</h1>
    
    <div class="card">
        <h2>Проверка кнопок</h2>
        
        <div class="counter" id="counter">0</div>
        
        <button onclick="increment()">➕ НАЖМИ МЕНЯ</button>
        <button onclick="resetCounter()">🔄 Сброс</button>
        
        <div class="test-area" id="testResult">
            Нажми на оранжевую кнопку 👆
        </div>
    </div>

    <div style="margin-top: 30px;">
        <button onclick="testAlert()">🔔 Тест alert</button>
        <button onclick="testConsole()">📝 Тест console</button>
    </div>

    <script>
        // ПРОСТЕЙШАЯ ПРОВЕРКА - запускается ли вообще JS
        console.log('🚀 Скрипт запущен!');
        
        // Показываем приветствие
        document.getElementById('testResult').innerHTML = '✅ JavaScript работает! ' + new Date().toLocaleTimeString();
        
        let count = 0;
        
        function increment() {
            count++;
            document.getElementById('counter').innerText = count;
            document.getElementById('testResult').innerHTML = '✅ Кнопка нажата! Счёт: ' + count;
            console.log('Кнопка нажата, счёт:', count);
            
            // Меняем цвет на секунду
            document.querySelector('.card').style.borderColor = '#ff5500';
            setTimeout(() => {
                document.querySelector('.card').style.borderColor = '#333';
            }, 200);
        }
        
        function resetCounter() {
            count = 0;
            document.getElementById('counter').innerText = count;
            document.getElementById('testResult').innerHTML = '🔄 Счёт сброшен';
        }
        
        function testAlert() {
            alert('🟢 Alert работает!');
        }
        
        function testConsole() {
            console.log('📝 Сообщение в консоль');
            document.getElementById('testResult').innerHTML = '📝 Проверь консоль (F12)';
        }

        // Проверка Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            document.getElementById('testResult').innerHTML += '<br>🟢 Telegram WebApp подключен';
        } else {
            document.getElementById('testResult').innerHTML += '<br>🔴 Telegram WebApp НЕ найден (это нормально при тесте в браузере)';
        }
    </script>
</body>
</html>
