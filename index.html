<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Vibe</title>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            color: #ff5500;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            font-size: 16px;
        }
        button {
            background: #ff5500;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #ff3300;
        }
        .track {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-align: left;
            border: 1px solid #333;
        }
        .track-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .track-artist {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        audio {
            width: 100%;
            border-radius: 8px;
        }
        .status {
            color: #ffaa00;
            margin: 10px 0;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        .debug {
            font-size: 12px;
            color: #888;
            text-align: left;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Pulse Vibe</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Введите название трека..." value="test">
            <button id="searchBtn">Найти</button>
        </div>
        
        <div id="status" class="status">⚡ Проверка сервера...</div>
        <div id="results"></div>
        <div id="debug" class="debug"></div>
    </div>

    <script>
        const SERVER_URL = 'https://music-app-bnm4-mne6.onrender.com';
        
        function debug(message) {
            const debugDiv = document.getElementById('debug');
            debugDiv.innerHTML += '> ' + message + '\n';
            console.log(message);
        }

        // Проверка сервера при загрузке
        async function checkServer() {
            try {
                debug('Проверка сервера: ' + SERVER_URL);
                const response = await fetch(SERVER_URL);
                const text = await response.text();
                debug('✅ Сервер ответил: ' + text);
                document.getElementById('status').innerHTML = '✅ Сервер работает';
            } catch (error) {
                debug('❌ Ошибка сервера: ' + error.message);
                document.getElementById('status').innerHTML = '❌ Сервер не отвечает';
            }
        }

        // Поиск музыки
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');

SoundHelix-Song-1.mp3

6:12
•
SoundHelix
if (!query) {
                alert('Введите запрос');
                return;
            }
            
            statusDiv.innerHTML = '🔍 Ищем: "' + query + '"...';
            resultsDiv.innerHTML = '';
            debug('Поиск: ' + query);
            
            try {
                const url = SERVER_URL + '/search?q=' + encodeURIComponent(query);
                debug('Запрос: ' + url);
                
                const response = await fetch(url);
                debug('Статус ответа: ' + response.status);
                
                if (!response.ok) {
                    throw new Error('HTTP ошибка ' + response.status);
                }
                
                const data = await response.json();
                debug('Получены данные: ' + JSON.stringify(data).substring(0, 200));
                
                statusDiv.innerHTML = '✅ Найдено треков: ' + data.length;
                
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<div class="track">😕 Ничего не найдено</div>';
                    return;
                }
                
                for(let i = 0; i < data.length; i++) {
                    const track = data[i];
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.innerHTML = `
                        <div class="track-title">${track.title || 'Без названия'}</div>
                        <div class="track-artist">${track.artist || 'Неизвестен'}</div>
                        <audio controls src="${track.url}"></audio>
                    `;
                    resultsDiv.appendChild(trackDiv);
                }
                
            } catch (error) {
                debug('❌ Ошибка: ' + error.message);
                statusDiv.innerHTML = '❌ Сервер не отвечает. Попробуйте через 10 секунд';
                
                // Показываем демо-треки для теста
                showDemoTracks();
            }
        }

        // Демо-треки на случай ошибки
        function showDemoTracks() {
            const resultsDiv = document.getElementById('results');
            const demos = [
                { title: "Bohemian Rhapsody", artist: "Queen", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
                { title: "Imagine", artist: "John Lennon", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
                { title: "Hotel California", artist: "Eagles", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
            ];
            
            for(let i = 0; i < demos.length; i++) {
                const track = demos[i];
                const trackDiv = document.createElement('div');
                trackDiv.className = 'track';
                trackDiv.innerHTML = `
                    <div class="track-title">${track.title} (демо)</div>
                    <div class="track-artist">${track.artist}</div>
                    <audio controls src="${track.url}"></audio>
                `;
                resultsDiv.appendChild(trackDiv);
            }
        }

        // Назначаем обработчики
        document.getElementById('searchBtn').onclick = searchMusic;
        document.getElementById('searchInput').onkeypress = function(e) {
            if (e.key === 'Enter') searchMusic();
        };

        // Запускаем проверку при загрузке
        window.onload = function() {
            checkServer();
            setTimeout(searchMusic, 1000);
        };
    </script>
</body>
</html>
